server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Brotli (preferido por navegadores modernos) + gzip de fallback.
  brotli on;
  brotli_comp_level 5;
  brotli_min_length 1024;
  brotli_types
    application/javascript
    application/json
    application/xml
    text/css
    text/plain
    text/xml
    image/svg+xml
    font/ttf
    font/otf;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_comp_level 6;
  gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/plain
    text/xml
    image/svg+xml
    font/ttf
    font/otf;

  location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  location /downloads/ {
    alias /usr/share/nginx/html/downloads/;
    autoindex off;
  }

  # Script de instalacion one-shot del agente en modo --mode=db.
  # El backend genera el script con el server URL inyectado.
  location = /install-db-agent.sh {
    proxy_pass http://backend:8080/install-db-agent.sh;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_read_timeout 10s;
  }

  location / {
    try_files $uri /index.html;
  }
}
