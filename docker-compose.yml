services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resource_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-resource_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-monitor}:${POSTGRES_PASSWORD:-monitor_pass}@postgres:5432/${POSTGRES_DB:-resource_monitor}?sslmode=disable
      SERVER_ADDR: ":8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  agent-assets:
    image: golang:1.25-alpine
    working_dir: /work/agent
    volumes:
      - ./agent:/src/agent:ro
      - ./scripts:/src/scripts:ro
      - agent-downloads:/downloads
    command: >
      sh -c "apk add --no-cache git ca-certificates &&
      cp -R /src/agent /work/agent &&
      go mod download &&
      GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /downloads/resource-monitor-agent-linux-amd64 ./cmd/agent &&
      GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o /downloads/resource-monitor-agent-windows-amd64.exe ./cmd/agent &&
      cp /src/scripts/install-agent.sh /downloads/install-agent.sh &&
      cp /src/scripts/install-agent.ps1 /downloads/install-agent.ps1 &&
      chmod 0644 /downloads/*"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:80"
    volumes:
      - agent-downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      backend:
        condition: service_started
      agent-assets:
        condition: service_completed_successfully

volumes:
  postgres-data:
  agent-downloads:
