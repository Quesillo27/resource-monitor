services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resource_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-resource_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resource_monitor} -d ${POSTGRES_DB:-resource_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-resource_monitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-resource_monitor}?sslmode=disable
      SERVER_ADDR: ":8080"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      OFFLINE_AFTER_SECONDS: ${OFFLINE_AFTER_SECONDS:-180}
      MANAGER_BUILD_SHA: ${MANAGER_BUILD_SHA:-}
    volumes:
      - agent-downloads:/downloads:ro
      - manager-triggers:/triggers
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  manager-updater:
    image: docker:28-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo
      - manager-triggers:/triggers
    environment:
      COMPOSE_FILE: docker-compose.prod.yml
      PROJECT_NAME: resource-monitor
    working_dir: /repo
    restart: unless-stopped
    command: ["sh", "/repo/scripts/manager-updater.sh"]

  agent-assets:
    image: golang:1.24-alpine
    working_dir: /work/agent
    volumes:
      - ./agent:/src/agent:ro
      - ./scripts:/src/scripts:ro
      - ./.git:/src/.git:ro
      - agent-downloads:/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /downloads/version.txt"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 60s
    command: >
      sh -c "apk add --no-cache git ca-certificates >/dev/null &&
      LAST_SHA='' &&
      while true; do
        CURRENT_SHA=$$(cd /src && git log -1 --format=%h -- agent/ scripts/install-agent.sh scripts/install-agent.ps1 2>/dev/null || echo unknown);
        if [ \"$$CURRENT_SHA\" != \"$$LAST_SHA\" ]; then
          TAG=$$(cd /src && git describe --tags --abbrev=0 --match 'v*' --exclude 'manager-v*' 2>/dev/null || echo v0.0.0);
          VERSION=\"$$TAG-$$CURRENT_SHA\";
          echo \"[agent-assets] $$LAST_SHA -> $$CURRENT_SHA (compilando $$VERSION; ultimo cambio agente)\";
          rm -rf /work/agent && mkdir -p /work/agent && cp -R /src/agent/. /work/agent/ &&
          cd /work/agent && go mod tidy &&
          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=$$VERSION\" -o /downloads/.next-linux-amd64 ./cmd/agent &&
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=$$VERSION\" -o /downloads/.next-windows-amd64.exe ./cmd/agent &&
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=$$VERSION\" -o /downloads/.next-darwin-amd64 ./cmd/agent &&
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=$$VERSION\" -o /downloads/.next-darwin-arm64 ./cmd/agent &&
          cd /downloads &&
          mv -f .next-linux-amd64       resource-monitor-agent-linux-amd64 &&
          mv -f .next-windows-amd64.exe resource-monitor-agent-windows-amd64.exe &&
          mv -f .next-darwin-amd64      resource-monitor-agent-darwin-amd64 &&
          mv -f .next-darwin-arm64      resource-monitor-agent-darwin-arm64 &&
          sha256sum resource-monitor-agent-linux-amd64 resource-monitor-agent-windows-amd64.exe resource-monitor-agent-darwin-amd64 resource-monitor-agent-darwin-arm64 > checksums.txt.tmp &&
          mv -f checksums.txt.tmp checksums.txt &&
          cp /src/scripts/install-agent.sh /downloads/install-agent.sh &&
          cp /src/scripts/install-agent.ps1 /downloads/install-agent.ps1 &&
          chmod 0644 /downloads/* &&
          printf '%s' \"$$VERSION\" > /downloads/version.txt.tmp &&
          mv -f /downloads/version.txt.tmp /downloads/version.txt &&
          LAST_SHA=$$CURRENT_SHA &&
          echo \"[agent-assets] listo: $$VERSION\";
        fi;
        sleep 15;
      done"
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://monitor.toolscode.cloud}
    ports:
      - "3010:80"
    volumes:
      - agent-downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      backend:
        condition: service_started
      agent-assets:
        condition: service_healthy
    restart: unless-stopped
    networks:
      internal:
      resource-monitor:
        ipv4_address: 172.21.0.10

volumes:
  postgres-data:
  agent-downloads:
  manager-triggers:

networks:
  internal:
  resource-monitor:
    name: resource-monitor
    external: true
