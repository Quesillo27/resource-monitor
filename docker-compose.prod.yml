services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resource_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-resource_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resource_monitor} -d ${POSTGRES_DB:-resource_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-resource_monitor}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-resource_monitor}?sslmode=disable
      SERVER_ADDR: ":8080"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      RETENTION_DAYS: ${RETENTION_DAYS:-30}
      OFFLINE_AFTER_SECONDS: ${OFFLINE_AFTER_SECONDS:-180}
      AGENT_RELEASE_VERSION: ${AGENT_RELEASE_VERSION:-v1.0.0}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  agent-assets:
    image: golang:1.24-alpine
    working_dir: /work/agent
    volumes:
      - ./agent:/src/agent:ro
      - ./scripts:/src/scripts:ro
      - agent-downloads:/downloads
    environment:
      AGENT_VERSION: ${AGENT_RELEASE_VERSION:-v1.0.0}
    command: >
      sh -c "apk add --no-cache git ca-certificates &&
      cp -R /src/agent/. /work/agent/ &&
      go mod tidy &&
      GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=${AGENT_VERSION}\" -o /downloads/resource-monitor-agent-linux-amd64 ./cmd/agent &&
      GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=${AGENT_VERSION}\" -o /downloads/resource-monitor-agent-windows-amd64.exe ./cmd/agent &&
      GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=${AGENT_VERSION}\" -o /downloads/resource-monitor-agent-darwin-amd64 ./cmd/agent &&
      GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags \"-X resource-monitor/agent/internal/version.Version=${AGENT_VERSION}\" -o /downloads/resource-monitor-agent-darwin-arm64 ./cmd/agent &&
      cd /downloads && sha256sum resource-monitor-agent-linux-amd64 resource-monitor-agent-windows-amd64.exe resource-monitor-agent-darwin-amd64 resource-monitor-agent-darwin-arm64 > checksums.txt &&
      cp /src/scripts/install-agent.sh /downloads/install-agent.sh &&
      cp /src/scripts/install-agent.ps1 /downloads/install-agent.ps1 &&
      chmod 0644 /downloads/*"
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://monitor.toolscode.cloud}
    ports:
      - "3010:80"
    volumes:
      - agent-downloads:/usr/share/nginx/html/downloads:ro
    depends_on:
      backend:
        condition: service_started
      agent-assets:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      internal:
      resource-monitor:
        ipv4_address: 172.21.0.10

volumes:
  postgres-data:
  agent-downloads:

networks:
  internal:
  resource-monitor:
    name: resource-monitor
    external: true
